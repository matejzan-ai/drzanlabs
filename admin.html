<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrZan Labs — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 200 200" width="48" height="48">
                <polygon points="100,10 178,55 178,145 100,190 22,145 22,55" fill="none" stroke="#d4af37" stroke-width="4"/>
                <text x="100" y="112" text-anchor="middle" font-family="Rajdhani" font-weight="400" font-size="42" letter-spacing="6" fill="#d4af37">DZ</text>
            </svg>
            <span>DrZan Labs</span>
        </div>
        <h1>Admin Panel</h1>

        <div id="setup-view" style="display:none">
            <p class="login-hint">Prvé spustenie — nastavte si heslo.</p>
            <div class="form-group">
                <input type="password" id="setup-pw" placeholder="Nové heslo" autocomplete="new-password">
            </div>
            <div class="form-group">
                <input type="password" id="setup-pw2" placeholder="Zopakovať heslo" autocomplete="new-password">
            </div>
            <button class="btn-login" id="setup-btn">Nastaviť heslo</button>
            <p class="login-error" id="setup-error"></p>
        </div>

        <div id="login-view">
            <div class="form-group">
                <input type="text" id="login-user" placeholder="Používateľské meno" autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" id="login-pw" placeholder="Heslo" autocomplete="current-password">
            </div>
            <button class="btn-login" id="login-btn">Prihlásiť sa</button>
            <p class="login-error" id="login-error"></p>
        </div>

        <a href="index.html" class="back-link">← Späť na stránku</a>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none">
    <header class="admin-header">
        <div class="admin-brand">
            <svg viewBox="0 0 200 200" width="28" height="28">
                <polygon points="100,10 178,55 178,145 100,190 22,145 22,55" fill="none" stroke="#d4af37" stroke-width="5"/>
                <text x="100" y="112" text-anchor="middle" font-family="Rajdhani" font-weight="400" font-size="42" letter-spacing="6" fill="#d4af37">DZ</text>
            </svg>
            <span>Admin Panel</span>
        </div>
        <div class="admin-lang-switch">
            <button class="lang-tab active" data-lang="sk">🇸🇰 SK</button>
            <button class="lang-tab" data-lang="en">🇬🇧 EN</button>
        </div>
        <div class="admin-actions">
            <span class="save-status" id="save-status"></span>
            <button class="btn-save" id="save-all-btn">💾 Uložiť všetko</button>
            <button class="btn-secondary" id="preview-btn">🌐 Zobraziť stránku</button>
            <button class="btn-danger" id="logout-btn">Odhlásiť</button>
        </div>
    </header>

    <div class="admin-layout">
        <nav class="admin-sidebar" id="admin-sidebar">
            <div class="sidebar-section-label">Obsah</div>
        </nav>
        <main class="admin-main" id="admin-main">
            <!-- generated by admin.js -->
        </main>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
